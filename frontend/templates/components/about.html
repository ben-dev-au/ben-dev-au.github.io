<!-- About Section Component — Polaroid Scatter Gallery -->
<section id="about-section" class="position-relative about-section">
    <div class="about-inner">
        <h2 class="about-hook">
            From sommelier to small business manager to software engineer...
        </h2>

        <div class="polaroid-gallery" id="polaroidGallery">
            <div class="polaroid" style="--rotation: -6deg; --x: 5%; --y: 8%;" data-caption="Fine dining service">
                <div class="polaroid-image">
                    <img src="/static/images/about/photo-1.jpg" alt="Fine dining service" loading="lazy">
                </div>
                <span class="polaroid-label">Fine Dining</span>
            </div>

            <div class="polaroid" style="--rotation: 4deg; --x: 28%; --y: 2%;" data-caption="Wine country rides">
                <div class="polaroid-image">
                    <img src="/static/images/about/photo-2.jpg" alt="Wine country rides" loading="lazy">
                </div>
                <span class="polaroid-label">Wine Country</span>
            </div>

            <div class="polaroid" style="--rotation: -3deg; --x: 52%; --y: 10%;" data-caption="Cellar work">
                <div class="polaroid-image">
                    <img src="/static/images/about/photo-3.jpg" alt="Cellar work" loading="lazy">
                </div>
                <span class="polaroid-label">The Cellar</span>
            </div>

            <div class="polaroid" style="--rotation: 7deg; --x: 75%; --y: 3%;" data-caption="Code & coffee">
                <div class="polaroid-image">
                    <img src="/static/images/about/photo-4.jpg" alt="Code and coffee" loading="lazy">
                </div>
                <span class="polaroid-label">Code & Coffee</span>
            </div>

            <div class="polaroid" style="--rotation: -5deg; --x: 15%; --y: 52%;" data-caption="Sommelier days">
                <div class="polaroid-image">
                    <img src="/static/images/about/photo-5.jpg" alt="Sommelier days" loading="lazy">
                </div>
                <span class="polaroid-label">Sommelier Days</span>
            </div>

            <div class="polaroid" style="--rotation: 3deg; --x: 58%; --y: 48%;" data-caption="On the road">
                <div class="polaroid-image">
                    <img src="/static/images/about/photo-6.jpg" alt="On the road" loading="lazy">
                </div>
                <span class="polaroid-label">On The Road</span>
            </div>
        </div>
    </div>

    <!-- Custom Lightbox -->
    <div class="lightbox-overlay" id="lightboxOverlay">
        <button class="lightbox-close" id="lightboxClose" aria-label="Close lightbox">&times;</button>
        <img class="lightbox-image" id="lightboxImage" src="" alt="">
        <p class="lightbox-caption" id="lightboxCaption"></p>
    </div>

    <div class="scroll-button-container">
        <a href="#resume-section" class="scroll-button-light" id="scrollToResume">
            <i class="fas fa-chevron-down"></i>
        </a>
    </div>
</section>
